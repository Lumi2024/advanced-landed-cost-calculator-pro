<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Import Intelligence PRO</title>

<link rel="stylesheet" href="style.css">

<script src="config.js"></script>
<script src="auth.js"></script>
<script src="scenarioManager.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="app.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

<div class="topbar">
    <h2>📊 Import Intelligence PRO</h2>
    <button onclick="toggleTheme()">🌓</button>
</div>

<div class="dashboard">

<div class="card">

<h3>Simulation</h3>

<input type="number" id="productValue" placeholder="Product Value">
<input type="number" id="shippingCost" placeholder="Shipping Cost">
<input type="number" id="customsRate" placeholder="Customs %">
<input type="number" id="marginRate" placeholder="Margin %">

<select id="country"></select>
<select id="currency"></select>

<button onclick="calculate()">Run Simulation</button>

<div id="result"></div>

<canvas id="profitChart"></canvas>

</div>

<div class="card">

<h3>Saved Scenarios</h3>
<div id="scenarioList"></div>

</div>

</div>

</body>
</html>
