<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Advanced Landed Cost Calculator PRO</title>

<link rel="stylesheet" href="style.css">

<script src="config.js"></script>
<script src="app.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

<div class="app-wrapper">

<header class="header">
<h1>📦 Landed Cost Calculator PRO</h1>
<p>Smart Import Cost Simulation Tool</p>
</header>

<section class="card">

<div class="grid">

<input type="number" id="productValue" placeholder="Product Value">

<input type="number" id="shippingCost" placeholder="Shipping Cost">

<input type="number" id="customsRate" placeholder="Customs %">

<input type="number" id="marginRate" placeholder="Margin %">

<select id="country"></select>

<select id="currency"></select>

</div>

<div class="buttons">
<button onclick="calculate()">🚀 Calculate</button>
<button onclick="exportCSV()">📊 CSV</button>
<button onclick="exportPDF()">📄 PDF</button>
<button onclick="saveScenario()">💾 Save</button>
</div>

<div id="result" class="result-box"></div>

</section>

<footer class="footer">
Advanced PRO Calculator • SaaS Ready Version
</footer>

</div>

</body>
</html>
