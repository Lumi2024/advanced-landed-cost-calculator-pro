<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Import Cost Simulator PRO</title>

<link rel="stylesheet" href="style.css">

<script src="config.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="app.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

<div class="app-wrapper">

<header class="hero">
<h1>📦 Import Cost Simulator PRO</h1>
<p>Professional Landed Cost Business Intelligence Tool</p>
</header>

<div class="card">

<div class="grid">

<input type="number" id="productValue" placeholder="Product Value">

<input type="number" id="shippingCost" placeholder="Shipping Cost">

<input type="number" id="customsRate" placeholder="Customs %">

<input type="number" id="marginRate" placeholder="Target Margin %">

<select id="country"></select>

<select id="currency"></select>

</div>

<div class="buttons">
<button onclick="calculate()">Calculate</button>
<button onclick="exportCSV()">CSV Export</button>
<button onclick="exportPDF()">PDF Export</button>
<button onclick="saveScenario()">Save Scenario</button>
</div>

<div id="result" class="result-box"></div>

<canvas id="profitChart"></canvas>

</div>

<footer class="footer">
Premium Business Calculator SaaS Edition
</footer>

</div>

</body>
</html>
